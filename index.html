<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오목 로비</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background:#f7f7f7; text-align:center; }
    header { background:#333; color:#fff; padding:16px 0; }
    #createBox { margin:24px auto; display:flex; justify-content:center; gap:8px; }
    #createBox input { padding:8px 12px; font-size:16px; width:180px; }
    #createBox button { padding:8px 16px; font-size:16px; cursor:pointer; }
    h2 { margin-top:32px; }
    #rooms { list-style:none; max-width:360px; margin:0 auto; padding:0; }
    #rooms li { background:#fff; margin:8px 0; padding:12px; border-radius:6px; border:1px solid #ddd; cursor:pointer; transition:background .2s; }
    #rooms li:hover { background:#e8f1ff; }
    #empty { color:#888; margin-top:16px; }
  </style>
</head>
<body>
  <header><h1>🀄 오목 대전 로비</h1></header>

  <!-- 방 생성 -->
  <div id="createBox">
    <input id="roomIdInput" placeholder="방 이름 (빈칸: 자동)" />
    <button id="btnCreate">방 만들기</button>
  </div>

  <!-- 방 목록 -->
  <h2>열린 방</h2>
  <ul id="rooms"></ul>
  <p id="empty">현재 열린 방이 없습니다.</p>

  <!-- Socket.IO -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    /* 방 목록 렌더 */
    function renderRooms(list) {
      const ul = document.getElementById('rooms');
      const empty = document.getElementById('empty');
      ul.innerHTML = '';
      if (list.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      list.forEach(({ id, players }) => {
        const li = document.createElement('li');
        li.textContent = `${id} (${players}/2)`;
        li.onclick = () => {
          window.location.href = `game.html?room=${encodeURIComponent(id)}&mode=join`;
        };
        ul.appendChild(li);
      });
    }

    // 서버에서 방 목록 전달
    socket.on('roomsList', renderRooms);

    /* 방 만들기 버튼 */
    document.getElementById('btnCreate').onclick = () => {
      const idInput = document.getElementById('roomIdInput');
      const id = idInput.value.trim() || Date.now().toString();
      window.location.href = `game.html?room=${encodeURIComponent(id)}&mode=create`;
    };
  </script>
</body>
</html>
