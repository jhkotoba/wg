<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오목 대전</title>
  <style>
    body { display:flex; flex-direction:column; align-items:center; justify-content:flex-start; min-height:100vh; margin:0; background:#f0f0f0; font-family:Arial, sans-serif; }
    #board { margin-top:20px; display:grid; grid-template-columns:repeat(15,40px); grid-template-rows:repeat(15,40px); background:#DDAD81; border:2px solid #333; }
    .cell { width:40px; height:40px; border:1px solid #333; box-sizing:border-box; position:relative; cursor:pointer; }
    .stone { width:34px; height:34px; border-radius:50%; position:absolute; top:3px; left:3px; }
    .black { background:#000; }
    .white { background:#fff; }
    #info { margin-top:18px; font-size:18px; }
    #backBtn { position:fixed; top:12px; left:12px; padding:6px 10px; cursor:pointer; }
  </style>
</head>
<body>
  <button id="backBtn" onclick="location.href='index.html'">← 로비</button>
  <h2 id="roomTitle"></h2>
  <div id="board"></div>
  <div id="info">게임 초기화 중...</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    /* ===== query 파싱 ===== */
    const params  = new URLSearchParams(location.search);
    const roomId  = params.get('room');
    const mode    = params.get('mode'); // 'create' | 'join'
    document.getElementById('roomTitle').textContent = `방: ${roomId}`;

    /* ===== 보드 설정 ===== */
    const size = 15;
    const boardState = Array.from({length:size}, () => Array(size).fill(null));
    let myColor      = null;
    let currentTurn  = null;
    let myTurn       = false;
    let gameOver     = false;

    const boardEl = document.getElementById('board');
    const infoEl  = document.getElementById('info');

    function createBoard() {
      for (let r=0;r<size;r++){
        for (let c=0;c<size;c++){
          const cell=document.createElement('div');
          cell.classList.add('cell');
          cell.dataset.row=r; cell.dataset.col=c;
          cell.addEventListener('click',onCellClick);
          boardEl.appendChild(cell);
        }
      }
    }
    function resetBoard() {
      boardState.forEach(row=>row.fill(null));
      boardEl.querySelectorAll('.cell').forEach(c=>c.innerHTML='');
    }
    function onCellClick(e){
      if(!myTurn||gameOver) return;
      const r=+e.currentTarget.dataset.row;
      const c=+e.currentTarget.dataset.col;
      if(boardState[r][c]!==null) return;
      socket.emit('place',{row:r,col:c});
    }
    function placeStoneLocal(r,c,color){
      boardState[r][c]=color;
      const cell=boardEl.querySelector(`[data-row="${r}"][data-col="${c}"]`);
      const stone=document.createElement('div');
      stone.classList.add('stone',color);
      cell.appendChild(stone);
    }

    createBoard();

    /* ===== Socket 연결 ===== */
    const socket = io();
    const nickname = prompt('닉네임을 입력하세요 (빈칸: Guest)') || 'Guest';
    socket.emit('login', nickname);

    if(mode==='create') socket.emit('createRoom', roomId);
    else                 socket.emit('joinRoom',   roomId);

    /* ----- 서버 이벤트 ----- */
    socket.on('roomsList', ()=>{}); // 로비 전용 이벤트 무시

    socket.on('errorMsg', msg => {
      alert(msg);
      location.href='index.html';
    });

    socket.on('init', ({yourColor,current})=>{
      myColor=yourColor; currentTurn=current; myTurn=(myColor===currentTurn); gameOver=false;
      resetBoard();
      infoEl.textContent=`당신은 ${myColor==='black'?'흑':'백'}돌 • ${myTurn?'당신 차례':'상대 차례'}`;
    });

    socket.on('placed',({row,col,color,next})=>{
      placeStoneLocal(row,col,color);
      currentTurn=next;
      myTurn = (myColor===currentTurn);
      if(!gameOver && next){
        infoEl.textContent=myTurn?'당신 차례입니다.':'상대 차례입니다.';
      }
    });

    socket.on('gameOver',({winner})=>{
      gameOver=true;
      infoEl.textContent = (winner===myColor)?'🎉 승리!':'😢 패배...';
    });

    socket.on('opponentLeft',()=>{
      gameOver=true;
      infoEl.textContent='상대가 방을 떠났습니다.';
    });
  </script>
</body>
</html>
